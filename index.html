<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <title>الاستعلام عن الرواتب - مديرية غاز الجنوب</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base target="_top">
    
    <style>
        /* تنسيق حاوية التحميل */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* لون خلفية الصفحة أثناء التحميل */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* تصميم الدائرة المتحركة الاحترافي */
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db; /* لون الدائرة المتحرك */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* إخفاء السكرول بار أثناء التحميل */
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="loader"></div>
    </div>

    <iframe id="myIframe" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" 
        src="https://script.google.com/macros/s/AKfycbzbT3OFCIRljutgpP0XhATpOqW3cKKAtFzWPDPE18vS91bjsdzBrFH59BGNUNBwIUmHpA/exec">
    </iframe>

    <script>
        // وظيفة لإخفاء دائرة التحميل عند اكتمال تحميل الـ iframe
        var iframe = document.getElementById('myIframe');
        var loader = document.getElementById('loader-container');

        iframe.onload = function() {
            // إضافة تأثير اختفاء تدريجي بسيط
            loader.style.transition = "opacity 0.5s ease";
            loader.style.opacity = "0";
            setTimeout(function() {
                loader.style.display = "none";
            }, 500);
        };
    </script>

</body>
</html>
